name: Stock Briefing Email

on:
  schedule:
    # Weekdays 08:05 KST. GitHub schedules use UTC.
    - cron: "5 23 * * 0-4"
    # Weekdays 22:05 KST. GitHub schedules use UTC.
    - cron: "5 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send stock briefing email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python briefing.py
